syntax = "proto3";

import "google/protobuf/descriptor.proto";

package isolated.declarations;

// Custom option that will be stored in _unknownFields
extend google.protobuf.MethodOptions {
  optional bool custom_option = 60000;
}

message TestRequest {
  string name = 1;
  int32 value = 2;
}

message TestResponse {
  string result = 1;
  bool success = 2;
}

service TestService {
  rpc TestMethod(TestRequest) returns (TestResponse) {
    option (custom_option) = true;
  }
  rpc StreamingMethod(stream TestRequest) returns (stream TestResponse);
}
